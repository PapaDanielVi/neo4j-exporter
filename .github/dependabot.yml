version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      k8s:
        patterns: ["k8s.io/*"]
      golang-x:
        patterns: ["golang.org/x/*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
