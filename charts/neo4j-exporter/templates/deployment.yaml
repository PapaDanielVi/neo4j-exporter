apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neo4j-exporter.fullname" . }}
  labels:
    {{- include "neo4j-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "neo4j-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "neo4j-exporter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "neo4j-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--neo4j.uri={{ .Values.neo4j.uri }}"
            - "--neo4j.user={{ .Values.neo4j.user }}"
            {{- if .Values.serviceDiscovery.enabled }}
            - "--sd.primary-uri={{ .Values.serviceDiscovery.primaryUri }}"
            {{- end }}
            {{- if .Values.custom.queries }}
            - "--custom-queries-file=/config/custom_queries.yaml"
            {{- end }}
          ports:
            - name: http
              containerPort: 9121
              protocol: TCP
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.neo4j.existingSecret }}
                  key: {{ .Values.neo4j.secretKey }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.custom.queries }}
          volumeMounts:
            - name: config
              mountPath: /config
          {{- end }}
      {{- if .Values.custom.queries }}
      volumes:
        - name: config
          configMap:
            name: {{ include "neo4j-exporter.fullname" . }}-config
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
