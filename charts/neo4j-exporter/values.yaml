replicaCount: 1

image:
  repository: ghcr.io/zoo/neo4j-exporter
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9121"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 9121

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Neo4j connection settings
neo4j:
  uri: "bolt://neo4j:7687"
  user: "neo4j"
  # Password is read from a Kubernetes secret
  existingSecret: "neo4j-credentials"
  secretKey: "password"

# Service discovery
serviceDiscovery:
  enabled: false
  primaryUri: ""

# Custom metrics
custom:
  queries: {}

# Prometheus Operator ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
  labels: {}
