---
# Ansible playbook for deploying neo4j-exporter
# Supports both binary and Docker deployment methods

- name: Deploy neo4j-exporter
  hosts: neo4j_exporter
  become: true
  vars:
    neo4j_exporter_deployment_method: binary  # Options: binary, docker

  pre_tasks:
    - name: Ensure deployment method is valid
      ansible.builtin.assert:
        that:
          - neo4j_exporter_deployment_method in ['binary', 'docker']
        fail_msg: "Invalid deployment method. Must be 'binary' or 'docker'."

  roles:
    - neo4j_exporter

  post_tasks:
    - name: Verify neo4j-exporter is running
      ansible.builtin.uri:
        url: "http://{{ neo4j_exporter_listen_address | regex_replace('^:', '') }}/healthz"
        method: GET
        status_code: 200
        timeout: 10
      register: neo4j_exporter_health_check
      retries: 5
      delay: 5
      until: neo4j_exporter_health_check.status == 200
      when: neo4j_exporter_deployment_method == 'binary'
