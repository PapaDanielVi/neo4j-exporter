---
# Docker deployment tasks for neo4j-exporter
# For production use with idempotent operations, install:
#   ansible-galaxy collection install community.docker

- name: Validate Docker is available
  ansible.builtin.stat:
    path: /var/run/docker.sock
  register: neo4j_exporter_docker_sock
  failed_when: false

- name: Fail if Docker is not available
  ansible.builtin.assert:
    that:
      - neo4j_exporter_docker_sock.stat.exists
    fail_msg: "Docker is not installed or the Docker daemon is not running."

- name: Create installation directory for custom files
  ansible.builtin.file:
    path: "{{ neo4j_exporter_install_dir }}"
    state: directory
    mode: '0755'
  when: neo4j_exporter_custom_queries_file is defined

- name: Copy custom queries to installation directory
  ansible.builtin.copy:
    src: "{{ neo4j_exporter_custom_queries_file }}"
    dest: "{{ neo4j_exporter_install_dir }}/custom_queries.yaml"
    mode: '0644'
  when: neo4j_exporter_custom_queries_file is defined

- name: Pull neo4j-exporter Docker image
  ansible.builtin.command:
    cmd: docker pull {{ neo4j_exporter_docker_image }}
  register: neo4j_exporter_pull_result
  retries: 3
  delay: 5
  until: neo4j_exporter_pull_result.rc == 0
  changed_when: "'Downloaded' in neo4j_exporter_pull_result.stdout"

- name: Stop and remove existing container
  ansible.builtin.command:
    cmd: docker rm -f {{ neo4j_exporter_docker_container_name }}
  failed_when: false
  changed_when: false

- name: Deploy neo4j-exporter container
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name={{ neo4j_exporter_docker_container_name }}
      --restart={{ neo4j_exporter_docker_restart_policy }}
      -p=9121:9121
      -e=NEO4J_URI={{ neo4j_exporter_neo4j_uri }}
      -e=NEO4J_USER={{ neo4j_exporter_neo4j_user }}
      -e=NEO4J_PASSWORD={{ neo4j_exporter_neo4j_password }}
      -e=NEO4J_EXPORTER_LISTEN_ADDRESS={{ neo4j_exporter_listen_address | regex_replace('^:', '') }}
      -e=NEO4J_EXPORTER_LOG_JSON={{ 'true' if neo4j_exporter_log_json else 'false' }}
      {% if neo4j_exporter_custom_queries_file is defined %}
      -v={{ neo4j_exporter_install_dir }}/custom_queries.yaml:/etc/neo4j-exporter/custom_queries.yaml
      -e=NEO4J_EXPORTER_CUSTOM_QUERIES=/etc/neo4j-exporter/custom_queries.yaml
      {% endif %}
      {{ neo4j_exporter_docker_image }}
  register: neo4j_exporter_deploy_result
  changed_when: neo4j_exporter_deploy_result.rc == 0
