# Neo4j Exporter Ansible Inventory
# Example inventory for deploying neo4j-exporter to target hosts

[neo4j_exporter]
# Add your target hosts here, e.g.:
# exporter01 ansible_host=192.168.1.10
# exporter02 ansible_host=192.168.1.11

[neo4j_exporter:vars]
# Deployment method: binary or docker
neo4j_exporter_deployment_method=binary

# Binary deployment settings
neo4j_exporter_user=neo4jexporter
neo4j_exporter_group=neo4jexporter
neo4j_exporter_install_dir=/opt/neo4j-exporter
neo4j_exporter_binary_url=https://github.com/PapaDanielVi/neo4j-exporter/releases/latest/download/neo4j-exporter-linux-amd64
neo4j_exporter_checksum=None  # Optional SHA256 checksum for verification

# Common neo4j-exporter settings
neo4j_exporter_listen_address=:9121
neo4j_exporter_neo4j_uri=bolt://localhost:7687
neo4j_exporter_neo4j_user=neo4j
neo4j_exporter_neo4j_password_file=/etc/neo4j-exporter/password
neo4j_exporter_log_json=false